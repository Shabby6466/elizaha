version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
    volumes:
      - ./backend:/app
    networks:
      - mahaha-network

  frontend:
    build: ./frontend
    ports:
      - "5002:80"
    depends_on:
      - backend
    networks:
      - mahaha-network

networks:
  mahaha-network:
    driver: bridge
